name: Sync addon branch

on:
  push:
    branches:
      - main
    paths:
      - "addons/tyle_map_editor/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-addon-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-addon:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git author
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync addon branch
        shell: bash
        env:
          ADDON_DIR: addons/tyle_map_editor
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          cp -a "${ADDON_DIR}/." "${tmp_dir}/"

          git fetch origin addon || true
          if git show-ref --verify --quiet refs/remotes/origin/addon; then
            git checkout -B addon origin/addon
          else
            git checkout --orphan addon
          fi

          git rm -r --ignore-unmatch .
          git clean -fdx
          cp -a "${tmp_dir}/." .
          git add -A

          if git diff --cached --quiet; then
            echo "addon branch already up to date"
            exit 0
          fi

          git commit -m "chore: sync addon branch from ${GITHUB_SHA::7}"
          git push origin addon
