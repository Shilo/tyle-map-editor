[plugin]
name="Tyle Map Editor"
description="Y not map faster? An intuitive Godot 4.6 editor plugin for terrain painting on TileMapLayer nodes — pick a terrain, choose from 7 paint tools (draw, line, rectangle, bucket, pick, select, erase), and paint directly in the viewport with cell selection, cut/copy/paste, and runtime dock support. Works exclusively with terrain sets and peering bits (not raw tiles)."
author="Shilo"
version="1.0"
script="tyle_map_editor_plugin.gd"
